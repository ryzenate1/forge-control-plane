# Optional Docker secrets override for sensitive environment variables.
# Usage:
#   docker compose -f compose.yml -f compose.secrets.yml --env-file .env up -d
# Create secret files in infra/secrets/ (one value per file, no trailing newline):
#   infra/secrets/postgres_password.secret
#   infra/secrets/forge_master_key.secret
#   infra/secrets/daemon_node_token.secret
#   infra/secrets/api_auth_secret.secret
#   infra/secrets/app_key.secret
# Reference implementation: traefik/docs/content/user-guides/docker-compose/acme-dns/docker-compose_secrets.yml
secrets:
  postgres_password:
    file: ./secrets/postgres_password.secret
  forge_master_key:
    file: ./secrets/forge_master_key.secret
  daemon_node_token:
    file: ./secrets/daemon_node_token.secret
  api_auth_secret:
    file: ./secrets/api_auth_secret.secret
  app_key:
    file: ./secrets/app_key.secret

services:
  postgres:
    secrets:
      - postgres_password
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_PASSWORD: ""

  api:
    secrets:
      - forge_master_key
      - daemon_node_token
      - api_auth_secret
      - app_key
    environment:
      FORGE_MASTER_KEY_FILE: /run/secrets/forge_master_key
      FORGE_MASTER_KEY: ""
      DAEMON_NODE_TOKEN_FILE: /run/secrets/daemon_node_token
      DAEMON_NODE_TOKEN: ""
      API_AUTH_SECRET_FILE: /run/secrets/api_auth_secret
      API_AUTH_SECRET: ""
      APP_KEY_FILE: /run/secrets/app_key
      APP_KEY: ""

  daemon:
    secrets:
      - daemon_node_token
    environment:
      DAEMON_NODE_TOKEN_FILE: /run/secrets/daemon_node_token
      DAEMON_NODE_TOKEN: ""

  web:
    secrets:
      - api_auth_secret
    environment:
      API_AUTH_SECRET_FILE: /run/secrets/api_auth_secret
      API_AUTH_SECRET: ""
