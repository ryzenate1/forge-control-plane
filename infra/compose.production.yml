# Production-only overrides. Invoke explicitly:
# docker compose -f compose.yml -f compose.production.yml --env-file .env up -d
# Requires Docker Compose 2.24.4+ for !override.
services:
  postgres:
    ports: !override
      - "127.0.0.1:5432:5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gamepanel} -d ${POSTGRES_DB:-gamepanel}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    ports: !override
      - "127.0.0.1:6379:6379"
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  api:
    ports: !override
      - "127.0.0.1:8080:8080"
      - "30000-30100:30000-30100/tcp"
      - "30000-30100:30000-30100/udp"
    restart: always
    healthcheck:
      test: ["CMD", "/api", "--healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  web:
    ports: !override
      - "127.0.0.1:3000:3000"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  daemon:
    ports: !override
      - "127.0.0.1:9090:9090"
      - "127.0.0.1:2022:2022"
    restart: always
    healthcheck:
      test: ["CMD", "/daemon", "--healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  prometheus:
    ports: !override
      - "127.0.0.1:9091:9090"
    restart: always

  alertmanager:
    ports: !override
      - "127.0.0.1:9093:9093"
    restart: always

  grafana:
    ports: !override
      - "127.0.0.1:3001:3000"
    restart: always

  postgres-backup:
    restart: always

  caddy:
    ports: !override
      - "127.0.0.1:80:80"
      - "127.0.0.1:443:443"
      - "127.0.0.1:2019:2019"
    restart: always
