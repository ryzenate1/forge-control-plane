# Security hardening override — Forge Control Plane.
# Apply on top of compose.yml for additional container isolation:
#   docker compose -f compose.yml -f compose.security.yml [command]
#
# Adds:
#   - seccomp default profile on all services
#   - AppArmor default profile on all services
#   - Read-only root filesystem with tmpfs for /tmp where possible
#   - Per-service cap_add for the minimum Linux capabilities required
#
# This file is OPTIONAL — compose.yml already includes baseline hardening
# (init, no-new-privileges, cap_drop ALL, resource limits, logging).

services:
  postgres:
    read_only: true
    tmpfs:
      - /tmp
      - /var/run/postgresql
    security_opt:
      - "no-new-privileges:true"
      - "seccomp=default"
      - "apparmor=default"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID

  redis:
