global:
  resolve_timeout: 5m
  smtp_smarthost: "${ALERTMANAGER_SMTP_HOST}:${ALERTMANAGER_SMTP_PORT}"
  smtp_from: "${ALERTMANAGER_SMTP_FROM}"
  smtp_auth_username: "${ALERTMANAGER_SMTP_USER}"
  smtp_auth_password: "${ALERTMANAGER_SMTP_PASS}"
  smtp_require_tls: true

templates:
  - "/etc/alertmanager/templates/*.tmpl"

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  receiver: "default"
  routes:
    - match:
        severity: critical
      receiver: "admin-email"
      continue: true
    - match:
        severity: critical
      receiver: "webhook"
    - match:
        severity: warning
      receiver: "webhook"

receivers:
  - name: "default"
    # No-op fallback.  Alertmanager logs every notification attempt so
    # unmatched alerts are visible in `docker logs alertmanager`.
  - name: "admin-email"
    email_configs:
      - to: "${ALERTMANAGER_ADMIN_EMAIL}"
        send_resolved: true
        html: '{{ template "email.html" . }}'
        text: '{{ template "email.text" . }}'
  - name: "webhook"
    webhook_configs:
      - url: "${ALERTMANAGER_WEBHOOK_URL}"
        send_resolved: true
