# Logging override — apply with:
#   docker compose -f compose.yml -f compose.logging.yml --env-file .env up -d

services:
  postgres:
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres-backup:
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api:
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  daemon:
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  prometheus:
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  alertmanager:
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  web:
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
