apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: gamepanel
  labels:
    app: gamepanel
    component: web
spec:
  ports:
    - port: 3000
      targetPort: 3000
      name: web
  selector:
    app: gamepanel
    component: web
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: gamepanel
  labels:
    app: gamepanel
    component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gamepanel
      component: web
  template:
    metadata:
      labels:
        app: gamepanel
        component: web
    spec:
      containers:
        - name: web
          image: ghcr.io/anomalyco/gamepanel/forge-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: web
          env:
            - name: NODE_ENV
              value: "production"
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: API_INTERNAL_URL
              value: "http://api:8080"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: web
  namespace: gamepanel
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
