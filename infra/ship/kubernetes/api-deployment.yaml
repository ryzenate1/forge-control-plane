apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: gamepanel
  labels:
    app: gamepanel
    component: api
spec:
  ports:
    - port: 8080
      targetPort: 8080
      name: api
  selector:
    app: gamepanel
    component: api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: gamepanel
  labels:
    app: gamepanel
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gamepanel
      component: api
  template:
    metadata:
      labels:
        app: gamepanel
        component: api
    spec:
      initContainers:
        - name: wait-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres -U gamepanel -d gamepanel; do
                echo "Waiting for postgres..."
                sleep 2
              done
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: gamepanel-secrets
                  key: POSTGRES_PASSWORD
        - name: wait-redis
          image: redis:7-alpine
          command:
            - sh
            - -c
            - |
              until redis-cli -h redis ping; do
                echo "Waiting for redis..."
                sleep 2
              done
      containers:
        - name: api
          image: ghcr.io/anomalyco/gamepanel/forge-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: api
          env:
            - name: API_ADDR
              valueFrom:
                configMapKeyRef:
                  name: gamepanel-config
                  key: API_ADDR
            - name: APP_ENV
              valueFrom:
                configMapKeyRef:
                  name: gamepanel-config
                  key: APP_ENV
            - name: FORGE_MASTER_KEY_ID
              valueFrom:
                configMapKeyRef:
                  name: gamepanel-config
                  key: FORGE_MASTER_KEY_ID
            - name: FORGE_ALLOW_EPHEMERAL_MASTER_KEY
              valueFrom:
                configMapKeyRef:
                  name: gamepanel-config
                  key: FORGE_ALLOW_EPHEMERAL_MASTER_KEY
            - name: MIGRATIONS_DIR
              valueFrom:
                configMapKeyRef:
                  name: gamepanel-config
                  key: MIGRATIONS_DIR
            - name: LANGS_DIR
              valueFrom:
                configMapKeyRef:
                  name: gamepanel-config
                  key: LANGS_DIR
            - name: REDIS_ADDR
              valueFrom:
                configMapKeyRef:
                  name: gamepanel-config
                  key: REDIS_ADDR
            - name: PANEL_URL
              valueFrom:
                configMapKeyRef:
                  name: gamepanel-config
                  key: PANEL_URL
            - name: LOAD_BALANCER_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: gamepanel-config
                  key: LOAD_BALANCER_ENABLED
            - name: API_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: gamepanel-secrets
                  key: API_AUTH_SECRET
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: gamepanel-secrets
                  key: APP_KEY
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: gamepanel-secrets
                  key: DATABASE_URL
            - name: FORGE_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: gamepanel-secrets
                  key: FORGE_MASTER_KEY
            - name: DAEMON_NODE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gamepanel-secrets
                  key: DAEMON_NODE_TOKEN
            - name: LOAD_BALANCER_PORT_MIN
              valueFrom:
                configMapKeyRef:
                  name: gamepanel-config
                  key: LOAD_BALANCER_PORT_MIN
            - name: LOAD_BALANCER_PORT_MAX
              valueFrom:
                configMapKeyRef:
                  name: gamepanel-config
                  key: LOAD_BALANCER_PORT_MAX
          livenessProbe:
            exec:
              command:
                - /api
                - --healthcheck
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - /api
                - --healthcheck
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api
  namespace: gamepanel
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
