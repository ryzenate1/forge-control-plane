apiVersion: v1
kind: Secret
metadata:
  name: gamepanel-secrets
  namespace: gamepanel
type: Opaque
stringData:
  # Replace ALL values below with your own generated secrets.
  # Use: openssl rand -hex 32
  POSTGRES_PASSWORD: "CHANGE_ME_POSTGRES_PASSWORD"
  DATABASE_URL: "postgres://gamepanel:CHANGE_ME_POSTGRES_PASSWORD@postgres:5432/gamepanel?sslmode=disable"
  API_AUTH_SECRET: "CHANGE_ME_API_AUTH_SECRET"
  APP_KEY: "CHANGE_ME_APP_KEY"
  FORGE_MASTER_KEY: "CHANGE_ME_MASTER_KEY"
  DAEMON_NODE_TOKEN: "CHANGE_ME_NODE_TOKEN_ID.CHANGE_ME_NODE_TOKEN_SECRET"
  DAEMON_NODE_ID: "CHANGE_ME_NODE_UUID"
  GRAFANA_ADMIN_PASSWORD: "CHANGE_ME_GRAFANA_PASSWORD"
